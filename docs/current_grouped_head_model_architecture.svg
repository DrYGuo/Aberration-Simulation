<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1270" viewBox="0 0 1800 1270" role="img" aria-labelledby="title desc">
<title id="title">Current grouped-head residual MLP architecture for aberration coefficient regression</title>
<desc id="desc">Diagram of the current regression neural network and validation MAE/MSE table for the latest completed v12 benchmark-v2 run. No convolution layers are used.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
</marker>
<style>
.title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #111827; }
.subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #374151; }
.box-title { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #111827; }
.body { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #1f2937; }
.small { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #475569; }
.table-head { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; fill: #111827; }
.table-cell { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #1f2937; }
.arrow { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
.thin-arrow { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
.rule { stroke: #94a3b8; stroke-width: 1.2; }
.input { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
.process { fill: #f8fafc; stroke: #64748b; stroke-width: 2; }
.trunk { fill: #ecfdf5; stroke: #059669; stroke-width: 2; }
.head-scalar { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
.head-low { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; }
.head-high { fill: #fdf2f8; stroke: #db2777; stroke-width: 2; }
.output { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; }
.warning { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
.panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
.stripe { fill: #eef2f7; opacity: 0.75; }
</style>
</defs>
<rect x="0" y="0" width="1800" height="1270" fill="#ffffff"/>
<text x="70" y="70" class="title" text-anchor="start">Latest Regression Neural Network: D66 Grouped-Head Residual MLP</text>
<text x="70" y="104" class="subtitle" text-anchor="start">Feature-vector regression from probe-derived under/over-focus summaries to 12 aberration coefficients. No convolution layers.</text>
<rect x="70" y="160" width="280" height="150" rx="10" class="input"/>
<text x="96" y="198" class="box-title" text-anchor="start">Input Features</text>
<text x="96" y="230" class="body" text-anchor="start">D = 66 standardized features</text>
<text x="96" y="256" class="body" text-anchor="start">Uno Xigma/Mu/Rho summaries</text>
<text x="96" y="282" class="body" text-anchor="start">Under/over-focus harmonics</text>
<rect x="70" y="355" width="280" height="100" rx="10" class="process"/>
<text x="96" y="393" class="box-title" text-anchor="start">Preprocessing</text>
<text x="96" y="425" class="body" text-anchor="start">Scaler fit on train only</text>
<line x1="210" y1="310" x2="210" y2="355" class="arrow"/>
<rect x="450" y="150" width="320" height="100" rx="10" class="process"/>
<text x="478" y="188" class="box-title" text-anchor="start">Linear Skip Branch</text>
<text x="478" y="220" class="body" text-anchor="start">Linear(D, 12)</text>
<rect x="450" y="330" width="320" height="220" rx="10" class="trunk"/>
<text x="478" y="370" class="box-title" text-anchor="start">Shared Residual Trunk</text>
<text x="478" y="404" class="body" text-anchor="start">Linear(D, 320)</text>
<text x="478" y="432" class="body" text-anchor="start">SiLU + LayerNorm + Dropout</text>
<text x="478" y="460" class="body" text-anchor="start">Linear(320, 320)</text>
<text x="478" y="488" class="body" text-anchor="start">SiLU + LayerNorm + Dropout</text>
<text x="478" y="516" class="body" text-anchor="start">Linear(320, 320)</text>
<line x1="350" y1="405" x2="450" y2="405" class="arrow"/>
<path d="M 350 405 C 390 405, 395 200, 450 200" class="thin-arrow"/>
<rect x="870" y="145" width="330" height="105" rx="10" class="head-scalar"/>
<text x="900" y="184" class="box-title" text-anchor="start">Scalar Head</text>
<text x="900" y="216" class="body" text-anchor="start">C1, C3</text>
<rect x="870" y="315" width="330" height="115" rx="10" class="head-low"/>
<text x="900" y="354" class="box-title" text-anchor="start">Low-Order Vector Head</text>
<text x="900" y="386" class="body" text-anchor="start">A1_x/y, B2_x/y, A2_x/y</text>
<rect x="870" y="490" width="330" height="115" rx="10" class="head-high"/>
<text x="900" y="529" class="box-title" text-anchor="start">High-Order Vector Head</text>
<text x="900" y="561" class="body" text-anchor="start">S3_x/y, A3_x/y</text>
<path d="M 770 440 C 815 440, 820 198, 870 198" class="arrow"/>
<line x1="770" y1="440" x2="870" y2="373" class="arrow"/>
<path d="M 770 440 C 815 440, 820 548, 870 548" class="arrow"/>
<rect x="1295" y="320" width="140" height="110" rx="10" class="process"/>
<text x="1323" y="362" class="box-title" text-anchor="start">Concat</text>
<text x="1323" y="394" class="body" text-anchor="start">2 + 6 + 4 = 12</text>
<path d="M 1200 198 C 1250 198, 1260 355, 1295 355" class="thin-arrow"/>
<line x1="1200" y1="373" x2="1295" y2="373" class="thin-arrow"/>
<path d="M 1200 548 C 1250 548, 1260 410, 1295 410" class="thin-arrow"/>
<rect x="1490" y="190" width="210" height="95" rx="10" class="process"/>
<text x="1518" y="229" class="box-title" text-anchor="start">Residual Add</text>
<text x="1518" y="260" class="body" text-anchor="start">Skip + grouped heads</text>
<path d="M 770 200 C 1040 90, 1330 90, 1505 190" class="arrow"/>
<line x1="1435" y1="375" x2="1490" y2="238" class="arrow"/>
<rect x="1430" y="440" width="300" height="165" rx="10" class="output"/>
<text x="1460" y="480" class="box-title" text-anchor="start">Final 12 Targets</text>
<text x="1460" y="512" class="body" text-anchor="start">C1, C3, A1_x/y</text>
<text x="1460" y="540" class="body" text-anchor="start">B2_x/y, A2_x/y</text>
<text x="1460" y="568" class="body" text-anchor="start">S3_x/y, A3_x/y</text>
<line x1="1595" y1="285" x2="1595" y2="440" class="arrow"/>
<rect x="70" y="630" width="505" height="105" rx="10" class="panel"/>
<text x="98" y="670" class="box-title" text-anchor="start">Latest Completed Run</text>
<text x="98" y="700" class="body" text-anchor="start">v12 benchmark-v2 500K, seed 7</text>
<text x="98" y="726" class="small" text-anchor="start">Rows train/val/blind/stress: 492556 / 26977 / 27370 / 28097</text>
<rect x="635" y="630" width="505" height="105" rx="10" class="panel"/>
<text x="663" y="670" class="box-title" text-anchor="start">Training Setup</text>
<text x="663" y="700" class="body" text-anchor="start">Width 320, dropout 0.075, SmoothL1, AdamW</text>
<text x="663" y="726" class="small" text-anchor="start">Mini-batch + chunked evaluation; no image/CNN input</text>
<rect x="1200" y="630" width="530" height="105" rx="10" class="panel"/>
<text x="1228" y="670" class="box-title" text-anchor="start">Generalization Metrics</text>
<text x="1228" y="700" class="body" text-anchor="start">Overall normalized MAE: 0.00535</text>
<text x="1228" y="726" class="small" text-anchor="start">Overall normalized p95 error: 0.02370</text>
<rect x="70" y="760" width="1040" height="480" rx="12" class="panel"/>
<text x="94" y="795" class="box-title" text-anchor="start">Latest validation error by coefficient</text>
<text x="94" y="823" class="small" text-anchor="start">MAE/RMSE use target units; MSE uses squared target units.</text>
<text x="86" y="860" class="table-head" text-anchor="start">coefficient</text>
<text x="316" y="860" class="table-head" text-anchor="start">MAE</text>
<text x="511" y="860" class="table-head" text-anchor="start">MSE</text>
<text x="706" y="860" class="table-head" text-anchor="start">RMSE</text>
<text x="901" y="860" class="table-head" text-anchor="start">norm. MAE</text>
