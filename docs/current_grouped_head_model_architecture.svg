<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">Current grouped-head residual MLP architecture for aberration coefficient regression</title>
  <desc id="desc">Diagram of the current neural network: standardized feature inputs, a linear skip branch, a shared residual trunk, grouped output heads, and final addition to produce 12 aberration coefficient outputs. The diagram notes that there are no convolution layers.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #111827; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #374151; }
      .box-title { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #111827; }
      .box-text { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #1f2937; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #475569; }
      .note { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #334155; }
      .chip { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .thin-arrow { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .join { stroke: #475569; stroke-width: 2.2; fill: none; }
      .input { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
      .process { fill: #f8fafc; stroke: #64748b; stroke-width: 2; }
      .trunk { fill: #ecfdf5; stroke: #059669; stroke-width: 2; }
      .head-scalar { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .head-low { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; }
      .head-high { fill: #fdf2f8; stroke: #db2777; stroke-width: 2; }
      .output { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; }
      .warning { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
      .meta { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="960" fill="#ffffff"/>

  <text x="70" y="70" class="title">Current Regression Neural Network: Grouped-Head Residual MLP</text>
  <text x="70" y="104" class="subtitle">Tabular probe-derived features to 12 aberration coefficient targets. No convolution layers are used.</text>

  <rect x="1160" y="42" width="350" height="74" rx="8" class="warning"/>
  <text x="1185" y="72" class="box-title">Not a CNN</text>
  <text x="1185" y="96" class="box-text">Input is a feature vector, not images.</text>

  <rect x="70" y="165" width="260" height="168" rx="8" class="input"/>
  <text x="94" y="201" class="box-title">Input Feature Vector</text>
  <text x="94" y="231" class="box-text">D standardized scalar features</text>
  <text x="94" y="259" class="box-text">Current v6: D = 66</text>
  <text x="94" y="286" class="box-text">v8 basic: D = 81</text>
  <text x="94" y="313" class="box-text">v8 full: D = 189</text>

  <rect x="70" y="365" width="260" height="108" rx="8" class="process"/>
  <text x="94" y="401" class="box-title">Preprocessing</text>
  <text x="94" y="431" class="box-text">Standardize features</text>
  <text x="94" y="457" class="box-text">Scaler fit on train split only</text>

  <line x1="200" y1="333" x2="200" y2="365" class="arrow"/>

  <rect x="430" y="162" width="295" height="102" rx="8" class="process"/>
  <text x="456" y="199" class="box-title">Linear Skip Branch</text>
  <text x="456" y="229" class="box-text">Linear(D, 12)</text>
  <text x="456" y="253" class="small">Captures direct near-linear feature response</text>

  <rect x="430" y="340" width="295" height="210" rx="8" class="trunk"/>
  <text x="456" y="377" class="box-title">Shared Residual Trunk</text>
  <text x="456" y="410" class="box-text">Linear(D, 320)</text>
  <text x="456" y="437" class="box-text">SiLU + LayerNorm + Dropout</text>
  <text x="456" y="466" class="box-text">Linear(320, 320)</text>
  <text x="456" y="493" class="box-text">SiLU + LayerNorm + Dropout</text>
  <text x="456" y="522" class="box-text">Linear(320, 320)</text>
  <text x="456" y="546" class="small">Shared representation for all targets</text>

  <line x1="330" y1="419" x2="430" y2="419" class="arrow"/>
  <path d="M 330 419 C 370 419, 372 213, 430 213" class="thin-arrow"/>

  <rect x="830" y="160" width="310" height="112" rx="8" class="head-scalar"/>
  <text x="858" y="198" class="box-title">Scalar Head</text>
  <text x="858" y="228" class="box-text">Linear(320, 160) + SiLU + Dropout</text>
  <text x="858" y="254" class="box-text">Linear(160, 2)</text>
  <text x="858" y="279" class="small">Targets: C1, C3</text>

  <rect x="830" y="335" width="310" height="112" rx="8" class="head-low"/>
  <text x="858" y="373" class="box-title">Low-Order Vector Head</text>
  <text x="858" y="403" class="box-text">Linear(320, 160) + SiLU + Dropout</text>
  <text x="858" y="429" class="box-text">Linear(160, 6)</text>
  <text x="858" y="454" class="small">Targets: A1_x/y, B2_x/y, A2_x/y</text>

  <rect x="830" y="510" width="310" height="112" rx="8" class="head-high"/>
  <text x="858" y="548" class="box-title">High-Order Vector Head</text>
  <text x="858" y="578" class="box-text">Linear(320, 160) + SiLU + Dropout</text>
  <text x="858" y="604" class="box-text">Linear(160, 4)</text>
  <text x="858" y="629" class="small">Targets: S3_x/y, A3_x/y</text>

  <path d="M 725 445 C 775 445, 777 216, 830 216" class="arrow"/>
  <line x1="725" y1="445" x2="830" y2="391" class="arrow"/>
  <path d="M 725 445 C 775 445, 777 566, 830 566" class="arrow"/>

  <rect x="1218" y="330" width="130" height="118" rx="8" class="process"/>
  <text x="1246" y="374" class="box-title">Concat</text>
  <text x="1246" y="404" class="box-text">2 + 6 + 4</text>
  <text x="1246" y="430" class="box-text">= 12</text>

  <path d="M 1140 216 C 1185 216, 1187 365, 1218 365" class="thin-arrow"/>
  <line x1="1140" y1="391" x2="1218" y2="391" class="thin-arrow"/>
  <path d="M 1140 566 C 1185 566, 1187 417, 1218 417" class="thin-arrow"/>

  <rect x="1230" y="160" width="250" height="86" rx="8" class="process"/>
  <text x="1257" y="195" class="box-title">Residual Output</text>
  <text x="1257" y="225" class="box-text">Grouped heads produce 12 values</text>

  <line x1="1283" y1="330" x2="1283" y2="246" class="arrow"/>

  <circle cx="1365" cy="300" r="28" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="1355" y="309" class="box-title">+</text>

  <path d="M 725 213 C 945 110, 1190 110, 1345 281" class="arrow"/>
  <line x1="1350" y1="246" x2="1358" y2="274" class="thin-arrow"/>
  <line x1="1365" y1="328" x2="1365" y2="370" class="arrow"/>

  <rect x="1200" y="370" width="330" height="192" rx="8" class="output"/>
  <text x="1228" y="409" class="box-title">Final 12 Targets</text>
  <text x="1228" y="441" class="box-text">C1, C3</text>
  <text x="1228" y="470" class="box-text">A1_x, A1_y</text>
  <text x="1228" y="499" class="box-text">B2_x, B2_y</text>
  <text x="1228" y="528" class="box-text">A2_x, A2_y</text>
  <text x="1228" y="557" class="box-text">S3_x, S3_y, A3_x, A3_y</text>

  <rect x="70" y="660" width="430" height="188" rx="8" class="meta"/>
  <text x="98" y="700" class="box-title">Current Best v6 Model</text>
  <text x="98" y="733" class="box-text">D = 66, width = 320, dropout = 0.075</text>
  <text x="98" y="762" class="box-text">AdamW, SmoothL1, gradient clipping</text>
  <text x="98" y="791" class="box-text">Trainable parameters: 385,616</text>
  <text x="98" y="820" class="small">Best baseline: v6 benchmark-gap 100k, seed23/seed7 family</text>

  <rect x="585" y="660" width="430" height="188" rx="8" class="meta"/>
  <text x="613" y="700" class="box-title">v8 Feature Variants</text>
  <text x="613" y="733" class="box-text">Basic: D = 81, parameters = 390,596</text>
  <text x="613" y="762" class="box-text">Full: D = 189, parameters = 426,452</text>
  <text x="613" y="791" class="box-text">Same architecture, more derived input features</text>
  <text x="613" y="820" class="small">No new probe simulations or added defocus planes</text>

  <rect x="1100" y="660" width="430" height="188" rx="8" class="meta"/>
  <text x="1128" y="700" class="box-title">Why No Convolution?</text>
  <text x="1128" y="733" class="box-text">CNNs operate on image/grid tensors.</text>
  <text x="1128" y="762" class="box-text">This model receives engineered tabular features.</text>
  <text x="1128" y="791" class="box-text">The image/profile structure is compressed upstream.</text>
  <text x="1128" y="820" class="small">A future CNN would require training on images or raw profiles directly.</text>

  <text x="70" y="910" class="note">Forward computation: prediction = LinearSkip(standardized features) + GroupedHeadResidual(standardized features).</text>
</svg>
